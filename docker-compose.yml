services:
  postgres_warehouse:
    image: postgres:15
    container_name: energy_postgres_warehouse
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Europe/Istanbul
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pg_warehouse_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres_airflow:
    image: postgres:15
    container_name: energy_postgres_airflow
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB_NAME}
      TZ: Europe/Istanbul
    ports:
      - "${AIRFLOW_DB_PORT}:5432"
    volumes:
      - pg_airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_DB_USER} -d ${AIRFLOW_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  mlflow:
    build:
      context: .
      dockerfile: docker/mlflow/Dockerfile
    container_name: energy_mlflow
    restart: unless-stopped
    working_dir: /app
    environment:
      MLFLOW_TRACKING_URI: http://0.0.0.0:5000
      MLFLOW_SERVER_ALLOWED_HOSTS: "*"
    ports:
      - "${MLFLOW_PORT}:5000"
    volumes:
      - ./mlruns:/mlruns
    depends_on:
      - postgres_warehouse
    command: >
      mlflow server
      --backend-store-uri postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_warehouse:5432/${POSTGRES_DB}
      --default-artifact-root /mlruns
      --host 0.0.0.0
      --port 5000

  airflow:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: energy_airflow
    restart: unless-stopped
    environment:
      TZ: Europe/Istanbul
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres_airflow:5432/${AIRFLOW_DB_NAME}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__CORE__DEFAULT_TIMEZONE: Europe/Istanbul
      PYTHONPATH: /opt/airflow:/opt/airflow/src

      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      WAREHOUSE_DB_URI: ${WAREHOUSE_DB_URI}

      AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}

      EPIAS_USERNAME: ${EPIAS_USERNAME}
      EPIAS_PASSWORD: ${EPIAS_PASSWORD}
    ports:
      - "${AIRFLOW_PORT}:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./data:/opt/airflow/data
      - ./src:/opt/airflow/src
      - ./configs:/opt/airflow/configs
      - ./models:/opt/airflow/models
      - ./artifacts:/opt/airflow/artifacts
      - ./mlruns:/mlruns
    depends_on:
      postgres_airflow:
        condition: service_healthy
      postgres_warehouse:
        condition: service_healthy
      mlflow:
        condition: service_started
    command: >
      bash -lc '
        set -e
        airflow db migrate

        airflow users create \
          --username "${AIRFLOW_ADMIN_USER:-admin}" \
          --password "${AIRFLOW_ADMIN_PASSWORD:-admin}" \
          --firstname "Admin" \
          --lastname "User" \
          --role "Admin" \
          --email "admin@example.com" || true

        airflow webserver &
        exec airflow scheduler
      '

volumes:
  pg_warehouse_data:
  pg_airflow_data: